<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16c4d0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="윈바신갈" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>윈바신갈지역아동센터</title>
  <style>
    :root{
      --main:#16c4d0;
      --main-dark:#05aebd;
      --soft:#fff7ff;
      --ink:#111111;
      --muted:#4b4b55;
      --card:#55dce8;
      --shadow:0 18px 40px rgba(6, 157, 172, .24);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:var(--soft);color:var(--ink)}
    body{overflow-x:hidden}
    .app{min-height:100dvh;display:flex;flex-direction:column;background:linear-gradient(#12c3d0 0 42%, var(--soft) 42% 100%)}
    .hero{position:relative;min-height:42dvh;padding:calc(env(safe-area-inset-top) + 34px) 24px 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center;overflow:hidden}
    .top-mark{position:absolute;right:42px;top:calc(env(safe-area-inset-top) + 30px);width:58px;height:58px;border-radius:18px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-weight:900;font-size:23px;letter-spacing:-1px}
    .logo{width:124px;height:124px;border-radius:28px;background:#58dce8;display:grid;place-items:center;box-shadow:0 12px 28px rgba(0,0,0,.08);margin-bottom:24px}
    .logo span{font-size:54px;font-weight:900;color:white;line-height:1;letter-spacing:-3px;text-shadow:0 4px 10px rgba(0,0,0,.12)}
    h1{font-size:clamp(30px,7vw,46px);line-height:1.15;margin:0;font-weight:900;letter-spacing:-2px}
    .shine{width:min(460px,64vw);height:10px;border-radius:999px;background:radial-gradient(ellipse at center, rgba(255,255,255,.45), rgba(255,255,255,0) 70%);margin-top:72px}
    .wave{position:absolute;bottom:-1px;left:0;width:100%;height:36px;background:radial-gradient(circle at 18px 36px, var(--soft) 0 35px, transparent 36px) 0 0/72px 36px repeat-x}
    .menu{flex:1;padding:clamp(54px,10vh,110px) 28px 36px;display:flex;flex-direction:column;justify-content:space-between;gap:50px}
    .buttons{display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,10vw,88px);max-width:740px;margin:0 auto;width:100%}
    .item{border:0;background:transparent;padding:0;text-align:center;cursor:pointer;color:inherit;text-decoration:none;display:block}
    .tile{width:100%;aspect-ratio:1/1;border:12px solid var(--main);border-radius:34px;background:var(--card);display:grid;place-items:center;box-shadow:var(--shadow);transition:.18s ease transform,.18s ease box-shadow}
    .item:active .tile{transform:scale(.96);box-shadow:0 8px 18px rgba(6,157,172,.26)}
    .emoji{font-size:clamp(52px,14vw,94px);filter:drop-shadow(0 4px 0 rgba(0,0,0,.08))}
    .label{display:block;margin-top:18px;font-size:clamp(24px,5.8vw,42px);font-weight:900;letter-spacing:-1.5px}
    .notice{max-width:720px;margin:0 auto;text-align:center;color:var(--muted);font-size:clamp(17px,3.8vw,26px);line-height:1.58;font-weight:800;letter-spacing:-.5px;padding-bottom:calc(env(safe-area-inset-bottom) + 6px)}
    .install{position:fixed;left:18px;right:18px;bottom:calc(env(safe-area-inset-bottom) + 18px);display:none;align-items:center;justify-content:space-between;gap:12px;background:#ffffff;border:1px solid rgba(0,0,0,.08);border-radius:20px;padding:14px 16px;box-shadow:0 18px 40px rgba(0,0,0,.18);z-index:10}
    .install p{margin:0;font-size:14px;line-height:1.35;font-weight:700;color:#202028}.install button{border:0;border-radius:14px;padding:10px 14px;background:var(--main);color:white;font-weight:900;white-space:nowrap}.install .close{background:#f0f0f4;color:#333}
    @media(max-width:420px){.hero{min-height:41dvh}.buttons{gap:34px}.tile{border-width:9px;border-radius:28px}.menu{padding-left:26px;padding-right:26px}.notice{font-size:18px}.logo{width:104px;height:104px}.logo span{font-size:45px}.shine{margin-top:54px}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-label="앱 상단 화면">
      <div class="top-mark" aria-hidden="true">W</div>
      <div class="logo" aria-hidden="true"><span>W</span></div>
      <h1>윈바신갈지역아동센터</h1>
      <div class="shine" aria-hidden="true"></div>
      <div class="wave" aria-hidden="true"></div>
    </section>
    <section class="menu" aria-label="메뉴 선택">
      <div class="buttons">
        <a class="item" href="https://www.hjy.kr/center/index.php?cId=em-pk" target="_blank" rel="noopener noreferrer" aria-label="윈바신갈지역아동센터 홈페이지 열기">
          <div class="tile"><div class="emoji">🏠</div></div>
          <span class="label">홈페이지</span>
        </a>
        <a class="item" href="https://www.coupang.com/" target="_blank" rel="noopener noreferrer" aria-label="좋은가게 열기">
          <div class="tile"><div class="emoji">🏪</div></div>
          <span class="label">좋은가게</span>
        </a>
      </div>
      <p class="notice">이 포스팅은 쿠팡 파트너스 활동의 일환으로,<br>이에 따른 일정액의 수수료를 제공받습니다.</p>
    </section>
  </main>

  <div class="install" id="installBox">
    <p>휴대폰 홈 화면에 앱처럼 설치할 수 있습니다.</p>
    <button id="installBtn">설치</button>
    <button class="close" id="closeBtn" aria-label="닫기">닫기</button>
  </div>

  <script>
    let deferredPrompt = null;
    const installBox = document.getElementById('installBox');
    const installBtn = document.getElementById('installBtn');
    const closeBtn = document.getElementById('closeBtn');

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBox.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBox.style.display = 'none';
    });

    closeBtn.addEventListener('click', () => {
      installBox.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
    }
  </script>
</body>
</html>
